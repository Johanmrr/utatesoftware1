<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <div class="flex items-center space-x-4">
        <a href="#" class="flex items-center space-x-3">
          <img src="img/logo.png" alt="Utate Software Solutions" class="h-10 w-10">
          <div>
            <span class="text-xl font-extrabold text-[var(--brand-bluee)]">Utate</span>
            <div class="text-sm -mt-1 text-[#1E293B] font-montserrat">Software Solutions</div>
          </div>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-6 text-sm text-[var(--brand-bluee)]">
        <a href="#home" class="hover:text-[var(--brand-orange)] transition">Home</a>
        <a href="#services" class="hover:text-[var(--brand-orange)] transition">Services</a>
        <a href="#testimonials" class="hover:text-[var(--brand-orange)] transition">Testimonials</a>
        <a href="#faq" class="hover:text-[var(--brand-orange)] transition">FAQ</a>
        <a href="OurTeam.html" class="hover:text-[var(--brand-orange)] transition">Our Team</a>
        <a href="#contact" class="hover:text-[var(--brand-orange)] transition">Contact</a>
      </nav>

      <!-- Mobile Menu Button -->
      <button id="menuBtn" class="md:hidden p-2 rounded-md hover:text-[var(--brand-orange)]">
        <span class="material-icons notranslate" translate="no">menu</span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="md:hidden hidden border-t text-[var(--brand-bluee)]">
    <div class="px-4 py-3 space-y-2">
      <a href="#home" class="block hover:text-[var(--brand-orange)]">Home</a>
      <a href="#services" class="block hover:text-[var(--brand-orange)]">Services</a>
      <a href="#testimonials" class="block hover:text-[var(--brand-orange)]">Testimonials</a>
      <a href="#faq" class="block hover:text-[var(--brand-orange)]">FAQ</a>
      <a href="OurTeam.html" class="block hover:text-[var(--brand-orange)]">Our Team</a>
      <a href="#contact" class="block hover:text-[var(--brand-orange)]">Contact</a>
    </div>
  </div>
</header>
